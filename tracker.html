<!DOCTYPE html>
<html>
<head>
    <title>My Daily Tracker</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        h1 {
            color: #38bdf8;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }
        button {
            background: #22c55e;
            color: white;
            cursor: pointer;
        }
        .entry {
            background: #1e293b;
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>🔥 My Life Tracker</h1>

<h3 id="date"></h3>

<input type="time" id="start">
<input type="time" id="end">
<input type="text" id="task" placeholder="What did you do?">

<br>
<button onclick="addTask()">Add</button>

<h2>📅 Daily Logs</h2>
<div id="logs"></div>

<script>

// Date display
let today = new Date();
document.getElementById("date").innerText =
    today.toDateString();

// Load saved data
let data = JSON.parse(localStorage.getItem("tasks")) || [];

// Show data
function display() {
    let logs = document.getElementById("logs");
    logs.innerHTML = "";

    data.forEach((item) => {
        logs.innerHTML += `
        <div class="entry">
            <b>${item.date}</b><br>
            ${item.start} - ${item.end}<br>
            ${item.task}
        </div>`;
    });
}

// Add task
function addTask() {
    let start = document.getElementById("start").value;
    let end = document.getElementById("end").value;
    let task = document.getElementById("task").value;

    if (!start || !end || !task) {
        alert("Fill all fields!");
        return;
    }

    let entry = {
        date: new Date().toDateString(),
        start,
        end,
        task
    };

    data.unshift(entry);

    localStorage.setItem("tasks", JSON.stringify(data));

    display();
}

display();

</script>

</body>
</html>
